name: DevOps 综合实践 CI/CD 流水线
on:
  push:
    branches: [ main ]
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 运行单元测试
        run: pytest test_app.py -v
      - name: 登录DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: 构建推送镜像
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:$SHORT_SHA
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/se-web-app:$SHORT_SHA
